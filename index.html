<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bubble Archive</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Pretendard',sans-serif;
background:#F3F3F3;
height:100vh;
overflow:hidden;
}

/* 배경 이미지 */
body::before{
content:'';
position:fixed;
inset:0;
background-image:url('YOUR_BACKGROUND_IMAGE');
background-size:cover;
background-position:center;
opacity:0.14;
z-index:-1;
}

/* 전체 */

.app{
width:100%;
height:100vh;
display:flex;
justify-content:center;
padding:18px;
gap:18px;
}

/* 채팅 */

.chat-wrap{
width:100%;
max-width:820px;
height:100%;
background:#ECECEC;
border-radius:32px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:
0 10px 40px rgba(0,0,0,0.08);
position:relative;
}

/* 상단 */

.top-bar{
background:white;
padding:22px 24px 18px;
border-bottom:1px solid #EFEFEF;
box-shadow:0 2px 12px rgba(0,0,0,0.03);
z-index:5;
}

.top-row{
display:flex;
align-items:center;
justify-content:space-between;
}

.back-btn{
font-size:34px;
font-weight:300;
cursor:pointer;
user-select:none;
}

.room-title{
font-size:20px;
font-weight:800;
letter-spacing:-0.03em;
}

.top-icons{
display:flex;
align-items:center;
gap:18px;
}

.icon-btn{
font-size:28px;
cursor:pointer;
user-select:none;
position:relative;
}

.status-text{
margin-top:12px;
font-size:15px;
font-weight:700;
text-align:center;
color:#111;
transition:0.2s;
}

.status-text span{
color:#FF7E8D;
}

.search-bar{
margin-top:12px;
display:none;
}

.search-input{
width:100%;
height:44px;
border:none;
outline:none;
border-radius:14px;
padding:0 16px;
font-size:15px;
font-family:'Pretendard',sans-serif;
background:#F5F5F5;
}

/* 채팅 영역 */

.chat-area{
flex:1;
overflow:auto;
padding:24px 18px 140px;
}

.chat-area::-webkit-scrollbar{
display:none;
}

.message{
display:flex;
gap:12px;
margin-bottom:26px;
align-items:flex-start;
}

.profile{
width:58px;
height:58px;
border-radius:50%;
border:3px solid #FF8C3A;
overflow:hidden;
flex-shrink:0;
background:white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.message-content{
max-width:78%;
}

.name-row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:8px;
}

.artist-tag{
background:#FF8738;
color:white;
font-size:12px;
font-weight:800;
padding:4px 9px;
border-radius:8px;
line-height:1;
}

.artist-name{
font-size:16px;
font-weight:800;
color:#111;
}

.bubble-row{
display:flex;
align-items:flex-end;
gap:10px;
}

.bubble{
background:white;
padding:18px 20px;
border-radius:24px;
font-size:18px;
line-height:1.45;
color:#111;
word-break:break-word;
position:relative;
box-shadow:0 2px 8px rgba(0,0,0,0.03);
}

.image-bubble{
padding:0;
overflow:hidden;
background:none;
box-shadow:none;
}

.image-bubble img{
width:100%;
max-width:500px;
border-radius:26px;
display:block;
}

.time{
font-size:14px;
color:#A6A6A6;
font-weight:600;
white-space:nowrap;
padding-bottom:6px;
}

.favorite-btn{
position:absolute;
top:12px;
right:12px;
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,0.95);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
backdrop-filter:blur(8px);
}

.favorite-btn.active{
background:#BFE8FF;
}

/* 하단 입력창 */

.bottom-input{
position:absolute;
left:18px;
right:18px;
bottom:18px;
height:76px;
background:#F8F8F8;
border-radius:999px;
display:flex;
align-items:center;
padding:0 24px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
cursor:pointer;
}

.fake-input{
flex:1;
height:100%;
display:flex;
align-items:center;
font-size:17px;
color:#C4C4C4;
font-weight:600;
}

.bottom-icons{
display:flex;
align-items:center;
gap:18px;
font-size:34px;
}

/* 메뉴 */

.menu-panel{
position:fixed;
top:100px;
right:28px;
width:280px;
background:white;
border-radius:24px;
padding:16px;
display:none;
flex-direction:column;
gap:10px;
box-shadow:0 12px 40px rgba(0,0,0,0.12);
z-index:999;
}

.menu-btn{
height:54px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:700;
cursor:pointer;
background:#F5F5F5;
font-family:'Pretendard',sans-serif;
}

.menu-btn.blue{
background:#BFE8FF;
color:#2478A9;
}

.menu-btn.pink{
background:#FFD7DE;
color:#C85B73;
}

/* 오버레이 */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.modal{
width:100%;
max-width:520px;
max-height:90vh;
overflow:auto;
background:white;
border-radius:30px;
padding:24px;
}

.modal::-webkit-scrollbar{
display:none;
}

.modal-title{
font-size:24px;
font-weight:800;
margin-bottom:22px;
}

.input{
width:100%;
height:56px;
border:none;
outline:none;
border-radius:18px;
background:#F5F5F5;
padding:0 18px;
font-size:15px;
font-family:'Pretendard',sans-serif;
margin-bottom:14px;
}

.textarea{
width:100%;
height:130px;
border:none;
outline:none;
border-radius:18px;
background:#F5F5F5;
padding:18px;
font-size:15px;
font-family:'Pretendard',sans-serif;
margin-bottom:14px;
resize:none;
}

.submit{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:#BFE8FF;
font-size:16px;
font-weight:800;
cursor:pointer;
font-family:'Pretendard',sans-serif;
color:#2478A9;
}

.cancel{
width:100%;
height:54px;
border:none;
border-radius:18px;
background:#F2F2F2;
font-size:15px;
font-weight:700;
cursor:pointer;
margin-top:10px;
font-family:'Pretendard',sans-serif;
}

/* 사진 모아보기 */

.gallery-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.gallery-item{
position:relative;
border-radius:20px;
overflow:hidden;
background:#EEE;
aspect-ratio:1/1;
}

.gallery-item img{
width:100%;
height:100%;
object-fit:cover;
}

.download-btn{
position:absolute;
bottom:10px;
right:10px;
background:rgba(255,255,255,0.95);
border:none;
border-radius:12px;
padding:8px 10px;
font-size:12px;
font-weight:800;
cursor:pointer;
}

/* 반응형 */

@media (max-width:900px){

.app{
padding:0;
}

.chat-wrap{
border-radius:0;
max-width:none;
height:100vh;
}

.menu-panel{
right:12px;
top:90px;
width:240px;
}

.message-content{
max-width:85%;
}

.image-bubble img{
max-width:100%;
}

}

</style>
</head>

<body>

<div class="app">

<div class="chat-wrap">

<!-- 상단 -->
<div class="top-bar">

<div class="top-row">

<div class="back-btn">
‹
</div>

<div class="room-title" id="roomTitle">
HAN YUJIN
</div>

<div class="top-icons">

<div class="icon-btn" onclick="toggleSearch()">
⌕
</div>

<div class="icon-btn" onclick="toggleMenu()">
⋮
</div>

</div>

</div>

<div class="status-text" id="statusText">
bubble 💗 + <span id="ddayText">1</span>
</div>

<div class="search-bar" id="searchBar">
<input
class="search-input"
id="searchInput"
placeholder="메시지 검색..."
oninput="runSearch()"
/>
</div>

</div>

<!-- 채팅 -->
<div class="chat-area" id="chatArea"></div>

<!-- 하단 -->
<div
class="bottom-input"
onclick="openMessageModal()"
>

<div class="fake-input">
메시지 추가하기
</div>

<div class="bottom-icons">
☺ ✈
</div>

</div>

</div>

</div>

<!-- 메뉴 -->
<div class="menu-panel" id="menuPanel">

<button
class="menu-btn blue"
onclick="openProfileModal()"
>
프로필 설정
</button>

<button
class="menu-btn"
onclick="openGallery()"
>
사진 모아보기
</button>

<button
class="menu-btn"
onclick="openFavorites()"
>
즐겨찾기 보기
</button>

</div>

<!-- 프로필 설정 -->
<div class="overlay" id="profileOverlay">

<div class="modal">

<div class="modal-title">
프로필 설정
</div>

<input
class="input"
id="roomTitleInput"
placeholder="채팅방 이름"
/>

<input
class="input"
id="artistNameInput"
placeholder="아티스트 이름"
/>

<input
class="input"
id="ddayInput"
placeholder="D-day 숫자"
/>

<input
class="input"
id="profileImageInput"
placeholder="프로필 이미지 링크"
/>

<input
class="input"
id="backgroundInput"
placeholder="배경 이미지 링크"
/>

<button
class="submit"
onclick="saveProfile()"
>
적용하기
</button>

<button
class="cancel"
onclick="closeProfileModal()"
>
닫기
</button>

</div>

</div>

<!-- 메시지 추가 -->
<div class="overlay" id="messageOverlay">

<div class="modal">

<div class="modal-title">
메시지 추가
</div>

<textarea
class="textarea"
id="messageInput"
placeholder="메시지 입력"
></textarea>

<input
class="input"
id="messageTimeInput"
placeholder="오후 3:20"
/>

<input
class="input"
id="messageImageInput"
placeholder="이미지 링크 (선택)"
/>

<label style="
display:flex;
align-items:center;
gap:10px;
margin-bottom:18px;
font-weight:700;
">

<input
type="checkbox"
id="artistCheck"
checked
>

ARTIST 표시

</label>

<button
class="submit"
onclick="addMessage()"
>
메시지 추가
</button>

<button
class="cancel"
onclick="closeMessageModal()"
>
닫기
</button>

</div>

</div>

<!-- 갤러리 -->
<div class="overlay" id="galleryOverlay">

<div class="modal">

<div class="modal-title">
사진 모아보기
</div>

<div
class="gallery-grid"
id="galleryGrid"
></div>

<button
class="cancel"
onclick="closeGallery()"
>
닫기
</button>

</div>

</div>

<script>

/* Firebase */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_MESSAGING_ID",
appId: "YOUR_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* archive */

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

/* 상태 */

let messages = [];

let profileData = {

roomTitle:'HAN YUJIN',
artistName:'HAN YUJIN',
dday:'1',
profileImage:'',
background:''

};

/* 요소 */

const chatArea =
document.getElementById('chatArea');

/* 불러오기 */

db.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messages =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderMessages(messages);

});

db.collection('bubbleProfiles')
.doc(archiveId)
.onSnapshot(doc=>{

if(doc.exists){

profileData = doc.data();

applyProfile();

}

});

/* 프로필 적용 */

function applyProfile(){

document.getElementById('roomTitle').innerText =
profileData.roomTitle || 'HAN YUJIN';

document.getElementById('ddayText').innerText =
profileData.dday || '1';

document.body.style.setProperty(
'--bg-image',
`url(${profileData.background})`
);

if(profileData.background){

document.body.style.backgroundImage =
`url(${profileData.background})`;

}

}

/* 메시지 렌더 */

function renderMessages(list){

chatArea.innerHTML = '';

list.forEach(msg=>{

const wrap =
document.createElement('div');

wrap.className = 'message';

const favoriteClass =
msg.favorite ? 'active' : '';

wrap.innerHTML = `

<div class="profile">

<img src="${
profileData.profileImage ||
'https://i.imgur.com/8Km9tLL.jpg'
}">

</div>

<div class="message-content">

<div class="name-row">

${
msg.artist
? `
<div class="artist-tag">
ARTIST
</div>
`
: ''
}

<div class="artist-name">
${profileData.artistName || 'HAN YUJIN'}
</div>

</div>

<div class="bubble-row">

<div class="
bubble
${msg.image ? 'image-bubble' : ''}
">

${
msg.image
? `
<img src="${msg.image}">
`
: `
${msg.text || ''}
`
}

<div
class="favorite-btn ${favoriteClass}"
onclick="toggleFavorite('${msg.id}')"
>
★
</div>

</div>

<div class="time">
${msg.time || ''}
</div>

</div>

</div>

`;

chatArea.appendChild(wrap);

});

chatArea.scrollTop =
chatArea.scrollHeight;

}

/* 메시지 추가 */

async function addMessage(){

const text =
document.getElementById('messageInput').value;

const time =
document.getElementById('messageTimeInput').value;

const image =
document.getElementById('messageImageInput').value;

const artist =
document.getElementById('artistCheck').checked;

if(!text && !image){

alert('메시지나 이미지를 입력해줘!');
return;

}

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.add({

text,
time,
image,
artist,
favorite:false,
createdAt:Date.now()

});

closeMessageModal();

document.getElementById('messageInput').value = '';
document.getElementById('messageTimeInput').value = '';
document.getElementById('messageImageInput').value = '';

}

/* 즐겨찾기 */

async function toggleFavorite(id){

const target =
messages.find(m=>m.id === id);

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({

favorite: !target.favorite

});

}

/* 검색 */

function toggleSearch(){

const bar =
document.getElementById('searchBar');

const status =
document.getElementById('statusText');

if(bar.style.display === 'block'){

bar.style.display = 'none';
status.style.display = 'block';

}else{

bar.style.display = 'block';
status.style.display = 'none';

}

}

function runSearch(){

const value =
document.getElementById('searchInput')
.value
.toLowerCase()
.trim();

const filtered =
messages.filter(msg=>{

const text =
(msg.text || '')
.toLowerCase();

return text.includes(value);

});

renderMessages(filtered);

}

/* 메뉴 */

function toggleMenu(){

const menu =
document.getElementById('menuPanel');

menu.style.display =
menu.style.display === 'flex'
? 'none'
: 'flex';

}

/* 프로필 */

function openProfileModal(){

document.getElementById('profileOverlay').style.display = 'flex';

toggleMenu();

}

function closeProfileModal(){

document.getElementById('profileOverlay').style.display = 'none';

}

async function saveProfile(){

const roomTitle =
document.getElementById('roomTitleInput').value;

const artistName =
document.getElementById('artistNameInput').value;

const dday =
document.getElementById('ddayInput').value;

const profileImage =
document.getElementById('profileImageInput').value;

const background =
document.getElementById('backgroundInput').value;

await db
.collection('bubbleProfiles')
.doc(archiveId)
.set({

roomTitle,
artistName,
dday,
profileImage,
background

});

closeProfileModal();

}

/* 메시지 모달 */

function openMessageModal(){

document.getElementById('messageOverlay').style.display = 'flex';

}

function closeMessageModal(){

document.getElementById('messageOverlay').style.display = 'none';

}

/* 갤러리 */

function openGallery(){

document.getElementById('galleryOverlay').style.display = 'flex';

const grid =
document.getElementById('galleryGrid');

grid.innerHTML = '';

const onlyImages =
messages.filter(msg=>msg.image);

onlyImages.forEach(msg=>{

const item =
document.createElement('div');

item.className = 'gallery-item';

item.innerHTML = `

<img src="${msg.image}">

<button
class="download-btn"
onclick="downloadImage('${msg.image}')"
>
저장
</button>

`;

grid.appendChild(item);

});

toggleMenu();

}

function closeGallery(){

document.getElementById('galleryOverlay').style.display = 'none';

}

/* 즐겨찾기 보기 */

function openFavorites(){

document.getElementById('galleryOverlay').style.display = 'flex';

const grid =
document.getElementById('galleryGrid');

grid.innerHTML = '';

const favorites =
messages.filter(msg=>msg.favorite);

favorites.forEach(msg=>{

const item =
document.createElement('div');

item.className = 'gallery-item';

item.innerHTML = `

${
msg.image
? `
<img src="${msg.image}">
`
: `
<div style="
padding:18px;
font-size:15px;
line-height:1.5;
display:flex;
align-items:center;
justify-content:center;
height:100%;
background:white;
">
${msg.text}
</div>
`
}

`;

grid.appendChild(item);

});

toggleMenu();

}

/* 다운로드 */

function downloadImage(url){

window.open(url,'_blank');

}

</script>

</body>
</html>
