<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bubble Archive</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Pretendard',sans-serif;
background:#ececec;
display:flex;
justify-content:center;
overflow-x:hidden;
}

.app{
width:100%;
max-width:430px;
background:#f3f3f3;
position:relative;
min-height:100vh;
}

.background{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
z-index:-2;
}

.background::after{
content:'';
position:absolute;
inset:0;
background:rgba(255,255,255,0.62);
backdrop-filter:blur(8px);
}

.header{
position:sticky;
top:0;
z-index:100;
background:#ffffffee;
backdrop-filter:blur(10px);
padding:14px 16px 16px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header-top{
display:flex;
align-items:center;
justify-content:space-between;
}

.header-btn{
width:34px;
height:34px;
border:none;
background:none;
font-size:28px;
cursor:pointer;
color:#111;
}

.header-center{
flex:1;
text-align:center;
}

.room-title{
font-size:20px;
font-weight:700;
letter-spacing:-0.02em;
color:#111;
}

.room-status{
margin-top:10px;
font-size:13px;
font-weight:600;
color:#111;
}

.room-status span{
color:#111;
}

.search-box{
display:none;
margin-top:14px;
}

.search-input{
width:100%;
height:44px;
border:none;
border-radius:14px;
padding:0 16px;
background:#f3f3f3;
font-size:14px;
outline:none;
font-family:'Pretendard',sans-serif;
}

.chat{
padding:18px 12px 140px;
display:flex;
flex-direction:column;
gap:18px;
min-height:2200px;
}

.message-row{
display:flex;
align-items:flex-start;
gap:10px;
}

.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
border:2px solid #ff7f2d;
background:#ddd;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.message-content{
display:flex;
flex-direction:column;
max-width:78%;
}

.artist-line{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
margin-left:3px;
}

.artist-badge{
background:#ff7f2d;
color:white;
font-size:10px;
font-weight:700;
padding:2px 7px;
border-radius:5px;
}

.artist-name{
font-size:14px;
font-weight:700;
color:#111;
}

.bubble-row{
display:flex;
align-items:flex-end;
gap:6px;
}

.bubble{
background:white;
padding:14px 16px;
border-radius:8px 20px 20px 20px;
font-size:15px;
line-height:1.5;
color:#111;
word-break:break-word;
position:relative;
}

.bubble-image{
width:100%;
border-radius:18px;
display:block;
}

.time{
font-size:11px;
color:#a7adb7;
white-space:nowrap;
margin-bottom:4px;
}

.favorite{
border:none;
background:none;
font-size:15px;
cursor:pointer;
color:#d6dce5;
margin-bottom:4px;
}

.favorite.active{
color:#9ec4e8;
}

.bottom{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:430px;
padding:12px;
background:#f7f7f7ee;
backdrop-filter:blur(10px);
display:flex;
align-items:center;
gap:10px;
z-index:200;
}

.fake-input{
flex:1;
height:50px;
border-radius:999px;
background:white;
border:1px solid #ececec;
display:flex;
align-items:center;
padding:0 18px;
font-size:14px;
color:#b0b5bd;
cursor:pointer;
}

.send-btn{
width:44px;
height:44px;
border:none;
background:none;
font-size:30px;
color:#b9bcc2;
cursor:pointer;
}

.sheet{
position:fixed;
inset:0;
background:rgba(0,0,0,0.38);
display:none;
justify-content:flex-end;
flex-direction:column;
z-index:999;
}

.sheet-content{
background:white;
border-radius:28px 28px 0 0;
padding:24px 18px 34px;
max-height:88vh;
overflow:auto;
}

.sheet-title{
font-size:22px;
font-weight:700;
margin-bottom:18px;
}

.input{
width:100%;
height:52px;
border:none;
background:#f3f3f3;
border-radius:15px;
padding:0 16px;
margin-bottom:12px;
font-size:14px;
outline:none;
font-family:'Pretendard',sans-serif;
}

.textarea{
width:100%;
height:120px;
border:none;
background:#f3f3f3;
border-radius:15px;
padding:14px;
margin-bottom:12px;
font-size:14px;
resize:none;
outline:none;
font-family:'Pretendard',sans-serif;
}

.submit{
width:100%;
height:54px;
border:none;
border-radius:16px;
background:#9ec4e8;
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
margin-top:8px;
}

.menu-grid{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-grid button{
height:54px;
border:none;
border-radius:16px;
background:#f3f3f3;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:18px;
display:block;
}

.favorite-card{
background:#f3f3f3;
padding:14px;
border-radius:16px;
margin-bottom:10px;
font-size:14px;
line-height:1.5;
}

.favorite-card img{
width:100%;
border-radius:14px;
margin-top:10px;
display:block;
}

@media (max-width:768px){

.app{
max-width:100%;
}

.bottom{
max-width:100%;
}

.chat{
min-height:2600px;
}

}

</style>

</head>

<body>

<div class="background" id="background"></div>

<div class="app">

<div class="header">

<div class="header-top">

<button class="header-btn" onclick="toggleSearch()">
⌕
</button>

<div class="header-center">

<div class="room-title" id="roomTitle">
HAN YUJIN
</div>

<div class="room-status">
bubble 💗 + <span id="dday">1</span>
</div>

</div>

<button class="header-btn" onclick="openMenu()">
⋮
</button>

</div>

<div class="search-box" id="searchBox">

<input
class="search-input"
id="searchInput"
placeholder="버블 검색"
oninput="searchMessages()"
>

</div>

</div>

<div class="chat" id="chat"></div>

<div class="bottom">

<div class="fake-input" onclick="openMessageSheet()">
메시지 추가하기
</div>

<button class="send-btn">
➤
</button>

</div>

</div>

<!-- MENU -->

<div class="sheet" id="menuSheet">

<div class="sheet-content">

<div class="sheet-title">
메뉴
</div>

<div class="menu-grid">

<button onclick="openProfileSheet()">
프로필 설정
</button>

<button onclick="openGallerySheet()">
사진 모아보기
</button>

<button onclick="openFavoriteSheet()">
즐겨찾기
</button>

</div>

</div>

</div>

<!-- PROFILE -->

<div class="sheet" id="profileSheet">

<div class="sheet-content">

<div class="sheet-title">
프로필 설정
</div>

<input class="input" id="roomTitleInput" placeholder="채팅방 이름">

<input class="input" id="artistNameInput" placeholder="아티스트 이름">

<input class="input" id="ddayInput" placeholder="디데이 숫자">

<input class="input" id="profileImageInput" placeholder="프로필 사진 링크">

<input class="input" id="backgroundInput" placeholder="배경 이미지 링크">

<button class="submit" onclick="saveProfile()">
저장하기
</button>

</div>

</div>

<!-- MESSAGE -->

<div class="sheet" id="messageSheet">

<div class="sheet-content">

<div class="sheet-title">
메시지 추가
</div>

<textarea
class="textarea"
id="messageText"
placeholder="버블 메시지"
></textarea>

<input
class="input"
id="messageImage"
placeholder="이미지 링크"
>

<input
class="input"
id="messageTime"
placeholder="예시 : 오후 3:20"
>

<button class="submit" onclick="addMessage()">
메시지 추가하기
</button>

</div>

</div>

<!-- GALLERY -->

<div class="sheet" id="gallerySheet">

<div class="sheet-content">

<div class="sheet-title">
사진 모아보기
</div>

<div class="gallery" id="gallery"></div>

</div>

</div>

<!-- FAVORITE -->

<div class="sheet" id="favoriteSheet">

<div class="sheet-content">

<div class="sheet-title">
즐겨찾기
</div>

<div id="favoriteList"></div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDmrRitOd3F2xoZasaWq6mFbAblrKZFzPg",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || getTodayArchive();

let profile = {};
let messages = [];

const chat =
document.getElementById('chat');

db.collection('profiles')
.doc(archiveId)
.onSnapshot(doc=>{

profile = doc.data() || {};

applyProfile();

});

db.collection('archives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messages =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderMessages(messages);

});

function getTodayArchive(){

const d = new Date();

const yy =
String(d.getFullYear()).slice(2);

const mm =
String(d.getMonth()+1).padStart(2,'0');

const dd =
String(d.getDate()).padStart(2,'0');

return yy + mm + dd;

}

function applyProfile(){

document.getElementById('roomTitle').innerText =
profile.roomTitle || 'HAN YUJIN';

document.getElementById('dday').innerText =
profile.dday || '1';

document.getElementById('background').style.backgroundImage =
`url('${profile.background || ''}')`;

}

function renderMessages(list){

chat.innerHTML='';

list.forEach(msg=>{

const row =
document.createElement('div');

row.className='message-row';

row.innerHTML=`

<div class="profile">

<img
src="${(profile.profileImage || '').trim() || 'https://i.imgur.com/8Km9tLL.jpg'}"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='https://i.imgur.com/8Km9tLL.jpg'"
>

</div>

<div class="message-content">

<div class="artist-line">

<div class="artist-badge">
ARTIST
</div>

<div class="artist-name">
${profile.artistName || 'HAN YUJIN'}
</div>

</div>

<div class="bubble-row">

<div class="bubble">

${msg.text ? `
<div>${msg.text}</div>
` : ''}

${msg.image ? `

<img
class="bubble-image"
src="${msg.image}"
loading="lazy"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.style.display='none'"
>

` : ''}

</div>

<div class="time">
${msg.time || ''}
</div>

<button
class="favorite ${msg.favorite ? 'active' : ''}"
onclick="toggleFavorite('${msg.id}',${msg.favorite})"
>
★
</button>

</div>

</div>

`;

chat.appendChild(row);

});

}

async function saveProfile(){

await db
.collection('profiles')
.doc(archiveId)
.set({

roomTitle:
document.getElementById('roomTitleInput').value.trim(),

artistName:
document.getElementById('artistNameInput').value.trim(),

dday:
document.getElementById('ddayInput').value.trim(),

profileImage:
document.getElementById('profileImageInput').value.trim(),

background:
document.getElementById('backgroundInput').value.trim()

});

closeSheets();

}

async function addMessage(){

const text =
document.getElementById('messageText').value.trim();

const image =
document.getElementById('messageImage').value.trim();

const time =
document.getElementById('messageTime').value.trim();

if(!text && !image){

alert('메시지나 이미지를 입력해줘!');
return;

}

await db
.collection('archives')
.doc(archiveId)
.collection('messages')
.add({

text,
image,
time,
favorite:false,
createdAt:Date.now()

});

document.getElementById('messageText').value='';
document.getElementById('messageImage').value='';
document.getElementById('messageTime').value='';

closeSheets();

}

async function toggleFavorite(id,current){

await db
.collection('archives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({

favorite:!current

});

}

function searchMessages(){

const value =
document.getElementById('searchInput')
.value
.toLowerCase()
.trim();

if(value===''){

renderMessages(messages);
return;

}

const filtered =
messages.filter(msg=>{

return `
${msg.text}
${msg.time}
`
.toLowerCase()
.includes(value);

});

renderMessages(filtered);

}

function openGallerySheet(){

closeSheets();

document.getElementById('gallerySheet').style.display='flex';

const gallery =
document.getElementById('gallery');

gallery.innerHTML='';

messages
.filter(msg=>msg.image)
.forEach(msg=>{

gallery.innerHTML += `

<a href="${msg.image}" target="_blank">

<img src="${msg.image}">

</a>

`;

});

}

function openFavoriteSheet(){

closeSheets();

document.getElementById('favoriteSheet').style.display='flex';

const list =
document.getElementById('favoriteList');

list.innerHTML='';

const favorites =
messages.filter(msg=>msg.favorite);

if(favorites.length===0){

list.innerHTML=`
<div style="font-size:14px;color:#9aa1ab;">
즐겨찾기한 메시지가 없어!
</div>
`;

return;

}

favorites.forEach(msg=>{

list.innerHTML += `

<div class="favorite-card">

${msg.text || ''}

${msg.image ? `

<img src="${msg.image}">

` : ''}

</div>

`;

});

}

function toggleSearch(){

const box =
document.getElementById('searchBox');

box.style.display =
box.style.display==='block'
? 'none'
: 'block';

}

function openMenu(){

closeSheets();

document.getElementById('menuSheet').style.display='flex';

}

function openProfileSheet(){

closeSheets();

document.getElementById('profileSheet').style.display='flex';

}

function openMessageSheet(){

closeSheets();

document.getElementById('messageSheet').style.display='flex';

}

function closeSheets(){

document.querySelectorAll('.sheet').forEach(sheet=>{

sheet.style.display='none';

});

}

document.querySelectorAll('.sheet').forEach(sheet=>{

sheet.addEventListener('click',e=>{

if(e.target===sheet){

sheet.style.display='none';

}

});

});

</script>

</body>
</html>
