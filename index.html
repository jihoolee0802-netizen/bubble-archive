<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bubble Archive</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{
width:100%;
min-height:100%;
font-family:'Pretendard',sans-serif;
background:#ECECEC;
overflow-x:hidden;
}

body{
position:relative;
padding:0;
}

.background{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
opacity:0.16;
z-index:-1;
}

.app{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
padding:0;
}

.chat-wrap{
width:100%;
max-width:920px;
min-height:100vh;
background:#ECECEC;
display:flex;
flex-direction:column;
position:relative;
}

/* 상단 */

.top-bar{
position:sticky;
top:0;
z-index:100;
background:white;
padding:20px 20px 16px;
border-bottom:1px solid #EFEFEF;
}

.top-row{
position:relative;
display:flex;
align-items:center;
justify-content:center;
height:34px;
}

.room-title{
font-size:21px;
font-weight:800;
letter-spacing:-0.03em;
color:#111;
}

.left-icons{
position:absolute;
left:0;
display:flex;
align-items:center;
gap:14px;
}

.right-icons{
position:absolute;
right:0;
display:flex;
align-items:center;
gap:16px;
}

.icon-btn{
font-size:24px;
cursor:pointer;
user-select:none;
}

.status-text{
margin-top:10px;
font-size:14px;
font-weight:700;
text-align:center;
color:#111;
}

.search-wrap{
display:none;
margin-top:12px;
}

.search-input{
width:100%;
height:48px;
border:none;
outline:none;
background:#F5F5F5;
border-radius:16px;
padding:0 16px;
font-size:15px;
font-family:'Pretendard',sans-serif;
}

/* 채팅 */

.chat-area{
flex:1;
padding:24px 18px 260px;
overflow:visible;
}

.message{
display:flex;
gap:12px;
align-items:flex-start;
margin-bottom:34px;
}

.profile{
width:54px;
height:54px;
border-radius:50%;
overflow:hidden;
border:3px solid #FF8B38;
background:white;
flex-shrink:0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.message-content{
max-width:82%;
}

.name-row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:8px;
}

.artist-tag{
background:#FF8B38;
color:white;
font-size:11px;
font-weight:800;
padding:4px 8px;
border-radius:8px;
line-height:1;
}

.artist-name{
font-size:15px;
font-weight:800;
color:#111;
}

.bubble-row{
display:flex;
align-items:flex-end;
gap:8px;
}

.bubble-wrap{
display:flex;
flex-direction:column;
gap:8px;
}

.bubble{
background:white;
padding:18px 20px;
border-radius:26px;
font-size:18px;
line-height:1.55;
color:#111;
word-break:break-word;
box-shadow:0 3px 14px rgba(0,0,0,0.04);
max-width:100%;
}

.image-bubble{
padding:0;
overflow:hidden;
background:none;
box-shadow:none;
}

.image-bubble img{
width:100%;
max-width:520px;
display:block;
border-radius:28px;
}

.bottom-row{
display:flex;
align-items:center;
gap:8px;
padding-left:6px;
}

.time{
font-size:13px;
font-weight:600;
color:#8F8F8F;
}

.favorite-btn{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
cursor:pointer;
background:#F3F3F3;
transition:0.15s;
}

.favorite-btn.active{
background:#BFE8FF;
color:#2478A9;
}

/* 입력창 */

.bottom-input{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:18px;
width:calc(100% - 24px);
max-width:880px;
height:76px;
border-radius:999px;
background:#F8F8F8;
display:flex;
align-items:center;
padding:0 24px;
box-shadow:0 8px 26px rgba(0,0,0,0.08);
z-index:200;
cursor:pointer;
}

.fake-input{
flex:1;
font-size:17px;
font-weight:600;
color:#B7B7B7;
}

.bottom-icons{
display:flex;
gap:14px;
font-size:28px;
}

/* 메뉴 */

.menu-panel{
position:fixed;
top:90px;
right:18px;
width:240px;
background:white;
border-radius:24px;
padding:14px;
display:none;
flex-direction:column;
gap:10px;
z-index:999;
box-shadow:0 14px 40px rgba(0,0,0,0.12);
}

.menu-btn{
height:52px;
border:none;
border-radius:16px;
background:#F5F5F5;
font-size:15px;
font-weight:700;
font-family:'Pretendard',sans-serif;
cursor:pointer;
}

.menu-btn.blue{
background:#BFE8FF;
color:#2478A9;
}

/* 모달 */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal{
width:100%;
max-width:560px;
max-height:88vh;
overflow:auto;
background:white;
border-radius:32px;
padding:26px;
}

.modal::-webkit-scrollbar{
display:none;
}

.modal-title{
font-size:25px;
font-weight:800;
margin-bottom:22px;
}

.input{
width:100%;
height:56px;
border:none;
outline:none;
border-radius:18px;
background:#F5F5F5;
padding:0 18px;
font-size:15px;
font-family:'Pretendard',sans-serif;
margin-bottom:14px;
}

.textarea{
width:100%;
height:180px;
border:none;
outline:none;
border-radius:22px;
background:#F5F5F5;
padding:18px;
font-size:15px;
line-height:1.6;
font-family:'Pretendard',sans-serif;
resize:none;
margin-bottom:14px;
}

.submit{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:#BFE8FF;
color:#2478A9;
font-size:16px;
font-weight:800;
font-family:'Pretendard',sans-serif;
cursor:pointer;
}

.cancel{
width:100%;
height:54px;
border:none;
border-radius:18px;
background:#F1F1F1;
font-size:15px;
font-weight:700;
font-family:'Pretendard',sans-serif;
cursor:pointer;
margin-top:10px;
}

/* 갤러리 */

.gallery-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.gallery-item{
position:relative;
overflow:hidden;
border-radius:22px;
aspect-ratio:1/1;
background:#EEE;
}

.gallery-item img{
width:100%;
height:100%;
object-fit:cover;
}

.download-btn{
position:absolute;
bottom:10px;
right:10px;
border:none;
background:rgba(255,255,255,0.96);
border-radius:12px;
padding:8px 10px;
font-size:12px;
font-weight:800;
cursor:pointer;
}

/* 반응형 */

@media (max-width:768px){

.chat-area{
padding:20px 14px 240px;
}

.message-content{
max-width:86%;
}

.bubble{
font-size:17px;
}

.image-bubble img{
max-width:100%;
}

.bottom-input{
height:72px;
}

}

</style>

</head>

<body>

<div
class="background"
id="background"
></div>

<div class="app">

<div class="chat-wrap">

<!-- 상단 -->

<div class="top-bar">

<div class="top-row">

<div class="left-icons"></div>

<div
class="room-title"
id="roomTitle"
>
HAN YUJIN
</div>

<div class="right-icons">

<div
class="icon-btn"
onclick="toggleSearch()"
>
⌕
</div>

<div
class="icon-btn"
onclick="toggleMenu()"
>
⋮
</div>

</div>

</div>

<div
class="status-text"
id="statusText"
>
bubble 💗 + <span id="ddayText">1</span>
</div>

<div
class="search-wrap"
id="searchWrap"
>

<input
class="search-input"
id="searchInput"
placeholder="메시지 검색..."
oninput="runSearch()"
/>

</div>

</div>

<!-- 채팅 -->

<div
class="chat-area"
id="chatArea"
></div>

</div>

</div>

<!-- 입력창 -->

<div
class="bottom-input"
onclick="openMessageModal()"
>

<div class="fake-input">
메시지 추가하기
</div>

<div class="bottom-icons">
☺ ✈
</div>

</div>

<!-- 메뉴 -->

<div
class="menu-panel"
id="menuPanel"
>

<button
class="menu-btn blue"
onclick="openProfileModal()"
>
프로필 설정
</button>

<button
class="menu-btn"
onclick="openGallery()"
>
사진 모아보기
</button>

<button
class="menu-btn"
onclick="openFavorites()"
>
즐겨찾기 보기
</button>

</div>

<!-- 프로필 -->

<div
class="overlay"
id="profileOverlay"
>

<div class="modal">

<div class="modal-title">
프로필 설정
</div>

<input
class="input"
id="roomTitleInput"
placeholder="채팅방 이름"
/>

<input
class="input"
id="artistNameInput"
placeholder="아티스트 이름"
/>

<input
class="input"
id="ddayInput"
placeholder="D-day 숫자"
/>

<input
class="input"
id="profileImageInput"
placeholder="프로필 이미지 링크"
/>

<input
class="input"
id="backgroundInput"
placeholder="배경 이미지 링크"
/>

<button
class="submit"
onclick="saveProfile()"
>
적용하기
</button>

<button
class="cancel"
onclick="closeProfileModal()"
>
닫기
</button>

</div>

</div>

<!-- 메시지 추가 -->

<div
class="overlay"
id="messageOverlay"
>

<div class="modal">

<div class="modal-title">
메시지 추가
</div>

<textarea
class="textarea"
id="messageInput"
placeholder="메시지 입력"
></textarea>

<input
class="input"
id="messageTimeInput"
placeholder="오후 3:20"
/>

<input
class="input"
id="messageImageInput"
placeholder="이미지 직접 링크 (https://i.ibb.co/...)"
/>

<label style="
display:flex;
align-items:center;
gap:10px;
margin-bottom:18px;
font-weight:700;
">

<input
type="checkbox"
id="artistCheck"
checked
>

ARTIST 표시

</label>

<button
class="submit"
onclick="addMessage()"
>
메시지 추가
</button>

<button
class="cancel"
onclick="closeMessageModal()"
>
닫기
</button>

</div>

</div>

<!-- 갤러리 -->

<div
class="overlay"
id="galleryOverlay"
>

<div class="modal">

<div
class="modal-title"
id="galleryTitle"
>
사진 모아보기
</div>

<div
class="gallery-grid"
id="galleryGrid"
></div>

<button
class="cancel"
onclick="closeGallery()"
>
닫기
</button>

</div>

</div>

<script>

/* Firebase */

const firebaseConfig = {

apiKey: "AIzaSyDmrRitOd3F2xoZasaWq6mFbAblrKZFzPg",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17",
measurementId: "G-3QK856857H"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* archive */

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

/* 상태 */

let messages = [];

let profileData = {

roomTitle:'HAN YUJIN',
artistName:'HAN YUJIN',
dday:'1',
profileImage:'',
background:''

};

const chatArea =
document.getElementById('chatArea');

/* 메시지 */

db.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messages =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderMessages(messages);

});

/* 프로필 */

db.collection('bubbleProfiles')
.doc(archiveId)
.onSnapshot(doc=>{

if(doc.exists){

profileData = doc.data();

applyProfile();

}

});

function applyProfile(){

document.getElementById('roomTitle').innerText =
profileData.roomTitle || 'HAN YUJIN';

document.getElementById('ddayText').innerText =
profileData.dday || '1';

if(profileData.background){

document.getElementById('background').style.backgroundImage =
`url(${profileData.background})`;

}

}

/* 렌더 */

function renderMessages(list){

chatArea.innerHTML = '';

list.forEach(msg=>{

const div =
document.createElement('div');

div.className = 'message';

div.innerHTML = `

<div class="profile">

<img src="${
profileData.profileImage ||
'https://i.imgur.com/8Km9tLL.jpg'
}">

</div>

<div class="message-content">

<div class="name-row">

${
msg.artist
? `
<div class="artist-tag">
ARTIST
</div>
`
: ''
}

<div class="artist-name">
${profileData.artistName || 'HAN YUJIN'}
</div>

</div>

<div class="bubble-row">

<div class="bubble-wrap">

<div class="
bubble
${msg.image ? 'image-bubble' : ''}
">

${
msg.image
? `
<img
src="${msg.image}"
loading="lazy"
referrerpolicy="no-referrer"
>
`
: `
${msg.text || ''}
`
}

</div>

<div class="bottom-row">

<div class="time">
${msg.time || ''}
</div>

<div
class="
favorite-btn
${msg.favorite ? 'active' : ''}
"
onclick="toggleFavorite('${msg.id}')"
>
★
</div>

</div>

</div>

</div>

</div>

`;

chatArea.appendChild(div);

});

}

/* 추가 */

async function addMessage(){

const text =
document.getElementById('messageInput').value;

const time =
document.getElementById('messageTimeInput').value;

const image =
document.getElementById('messageImageInput').value;

const artist =
document.getElementById('artistCheck').checked;

if(!text && !image){

alert('메시지나 이미지를 입력해줘!');
return;

}

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.add({

text,
time,
image,
artist,
favorite:false,
createdAt:Date.now()

});

closeMessageModal();

document.getElementById('messageInput').value='';
document.getElementById('messageTimeInput').value='';
document.getElementById('messageImageInput').value='';

}

/* 즐겨찾기 */

async function toggleFavorite(id){

const target =
messages.find(m=>m.id===id);

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({

favorite:!target.favorite

});

}

/* 검색 */

function toggleSearch(){

const wrap =
document.getElementById('searchWrap');

const status =
document.getElementById('statusText');

if(wrap.style.display === 'block'){

wrap.style.display = 'none';
status.style.display = 'block';

}else{

wrap.style.display = 'block';
status.style.display = 'none';

}

}

function runSearch(){

const value =
document.getElementById('searchInput')
.value
.toLowerCase()
.trim();

const filtered =
messages.filter(msg=>{

return (msg.text || '')
.toLowerCase()
.includes(value);

});

renderMessages(filtered);

}

/* 메뉴 */

function toggleMenu(){

const menu =
document.getElementById('menuPanel');

menu.style.display =
menu.style.display === 'flex'
? 'none'
: 'flex';

}

/* 프로필 */

function openProfileModal(){

document.getElementById('profileOverlay').style.display='flex';

toggleMenu();

}

function closeProfileModal(){

document.getElementById('profileOverlay').style.display='none';

}

async function saveProfile(){

await db
.collection('bubbleProfiles')
.doc(archiveId)
.set({

roomTitle:
document.getElementById('roomTitleInput').value,

artistName:
document.getElementById('artistNameInput').value,

dday:
document.getElementById('ddayInput').value,

profileImage:
document.getElementById('profileImageInput').value,

background:
document.getElementById('backgroundInput').value

});

closeProfileModal();

}

/* 메시지 */

function openMessageModal(){

document.getElementById('messageOverlay').style.display='flex';

}

function closeMessageModal(){

document.getElementById('messageOverlay').style.display='none';

}

/* 갤러리 */

function openGallery(){

document.getElementById('galleryOverlay').style.display='flex';

document.getElementById('galleryTitle').innerText =
'사진 모아보기';

const grid =
document.getElementById('galleryGrid');

grid.innerHTML='';

messages
.filter(msg=>msg.image)
.forEach(msg=>{

const div =
document.createElement('div');

div.className='gallery-item';

div.innerHTML=`

<img src="${msg.image}">

<button
class="download-btn"
onclick="window.open('${msg.image}','_blank')"
>
저장
</button>

`;

grid.appendChild(div);

});

toggleMenu();

}

function openFavorites(){

document.getElementById('galleryOverlay').style.display='flex';

document.getElementById('galleryTitle').innerText =
'즐겨찾기';

const grid =
document.getElementById('galleryGrid');

grid.innerHTML='';

messages
.filter(msg=>msg.favorite)
.forEach(msg=>{

const div =
document.createElement('div');

div.className='gallery-item';

div.innerHTML = msg.image
? `
<img src="${msg.image}">
`
: `
<div style="
background:white;
height:100%;
display:flex;
align-items:center;
justify-content:center;
padding:18px;
font-size:15px;
line-height:1.6;
text-align:center;
">
${msg.text}
</div>
`;

grid.appendChild(div);

});

toggleMenu();

}

function closeGallery(){

document.getElementById('galleryOverlay').style.display='none';

}

</script>

</body>
</html>
