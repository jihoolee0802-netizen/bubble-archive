<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bubble Archive</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Pretendard',sans-serif;
background:#d9d9d9;
height:100vh;
overflow:hidden;
}

.background{
position:fixed;
inset:0;
background-image:url('PASTE_MOMONGA_BACKGROUND_LINK_HERE');
background-size:cover;
background-position:center;
filter:blur(0px);
transform:scale(1.05);
z-index:-2;
}

.background::after{
content:'';
position:absolute;
inset:0;
background:rgba(255,255,255,0.72);
backdrop-filter:blur(6px);
}

.app{
width:100%;
max-width:760px;
height:100vh;
margin:auto;
display:flex;
flex-direction:column;
position:relative;
}

.header{
height:120px;
background:#f8f8f8;
border-bottom-left-radius:24px;
border-bottom-right-radius:24px;
padding:22px 20px 16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
flex-shrink:0;
}

.top-row{
display:flex;
align-items:center;
justify-content:space-between;
}

.icon-btn{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#111;
}

.room-title{
font-size:20px;
font-weight:700;
}

.sub-title{
margin-top:14px;
text-align:center;
font-size:20px;
font-weight:700;
font-style:italic;
}

.chat-wrap{
flex:1;
overflow:auto;
padding:18px 14px 180px;
}

.chat-wrap::-webkit-scrollbar{
display:none;
}

.message-row{
display:flex;
align-items:flex-start;
gap:10px;
margin-bottom:18px;
}

.profile{
width:48px;
height:48px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
border:2px solid #ff8b3d;
background:#fff;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.message-content{
max-width:78%;
}

.artist-line{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

.artist-badge{
background:#ff7f32;
color:white;
font-size:12px;
font-weight:700;
padding:3px 8px;
border-radius:6px;
}

.artist-name{
font-size:14px;
font-weight:700;
}

.bubble{
background:#f7f7f7;
padding:14px 16px;
border-radius:20px;
font-size:17px;
line-height:1.5;
word-break:break-word;
box-shadow:0 2px 8px rgba(0,0,0,0.04);
display:inline-block;
max-width:100%;
}

.message-image{
width:100%;
max-width:500px;
border-radius:24px;
display:block;
user-select:none;
-webkit-user-drag:none;
margin-top:4px;
}

.time{
font-size:13px;
color:#9c9c9c;
margin-top:8px;
margin-left:8px;
}

.bottom-bar{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 24px);
max-width:730px;
height:74px;
background:rgba(255,255,255,0.92);
border-radius:999px;
display:flex;
align-items:center;
padding:0 20px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
backdrop-filter:blur(10px);
}

.fake-input{
flex:1;
height:46px;
background:#fff;
border-radius:999px;
}

.bottom-icons{
display:flex;
gap:18px;
margin-left:16px;
font-size:30px;
color:#666;
}

.admin-btn{
position:fixed;
right:18px;
bottom:110px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#8fd3ff;
color:white;
font-size:26px;
font-weight:700;
box-shadow:0 10px 24px rgba(143,211,255,0.45);
z-index:999;
}

.panel{
position:fixed;
top:0;
right:-420px;
width:400px;
max-width:100%;
height:100vh;
background:#fff;
transition:0.28s ease;
overflow:auto;
padding:24px 18px 120px;
z-index:2000;
box-shadow:-10px 0 30px rgba(0,0,0,0.08);
}

.panel.open{
right:0;
}

.panel-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
border:none;
outline:none;
background:#f4f4f4;
border-radius:16px;
padding:16px;
margin-bottom:12px;
font-size:15px;
font-family:'Pretendard',sans-serif;
}

textarea.input{
min-height:120px;
resize:none;
}

.submit{
width:100%;
height:54px;
border:none;
border-radius:18px;
background:#8fd3ff;
color:white;
font-size:16px;
font-weight:700;
margin-bottom:14px;
}

.gallery-btn{
position:fixed;
left:18px;
bottom:110px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#ffffff;
font-size:24px;
box-shadow:0 10px 24px rgba(0,0,0,0.08);
z-index:999;
}

.search-box{
position:sticky;
top:0;
background:#fff;
padding-bottom:12px;
margin-bottom:16px;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.gallery img{
width:100%;
border-radius:18px;
display:block;
}

.favorite{
position:absolute;
right:12px;
top:12px;
font-size:22px;
}

@media (max-width:700px){

.header{
height:112px;
}

.room-title{
font-size:18px;
}

.bubble{
font-size:16px;
}

.panel{
width:100%;
}

}

</style>
</head>
<body>

<div class="background"></div>

<div class="app">

<div class="header">

<div class="top-row">
<div class="icon-btn">‹</div>
<div class="room-title" id="roomTitle">HAN YUJIN</div>
<div class="icon-btn">⌕</div>
</div>

<div class="sub-title" id="roomSubTitle">
 bubble 🩷 + 1
</div>

</div>

<div class="chat-wrap" id="chatWrap"></div>

</div>

<button class="gallery-btn" onclick="openGallery()">🖼</button>
<button class="admin-btn" onclick="togglePanel()">＋</button>

<div class="bottom-bar">
<div class="fake-input"></div>
<div class="bottom-icons">
☺ ✈
</div>
</div>

<div class="panel" id="panel">

<div class="panel-title">
ADMIN PANEL
</div>

<input class="input" id="artistName" placeholder="아티스트 이름">
<input class="input" id="artistPhoto" placeholder="프로필 사진 링크">
<input class="input" id="backgroundInput" placeholder="배경 이미지 링크">

<button class="submit" onclick="saveSettings()">
프로필 저장
</button>

<input class="input" id="messageText" placeholder="버블 내용">
<input class="input" id="messageImage" placeholder="사진 링크 (선택)">
<input class="input" id="messageTime" placeholder="오후 3:20">

<button class="submit" onclick="addMessage()">
버블 추가
</button>

<input class="input" id="searchInput" placeholder="전체 archive 검색...">
<button class="submit" onclick="runSearch()">
검색
</button>

<div id="searchResults"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDmrRitOd3F2xoZasaWq6mFbAblrKZFzPg",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17",
measurementId: "G-3QK856857H"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const archiveId = params.get('archive') || 'default';

const chatWrap = document.getElementById('chatWrap');

let messages = [];

function togglePanel(){

document
.getElementById('panel')
.classList.toggle('open');

}

async function saveSettings(){

const data = {
artistName:document.getElementById('artistName').value,
artistPhoto:document.getElementById('artistPhoto').value,
backgroundImage:document.getElementById('backgroundInput').value
};

await db
.collection('archives')
.doc(archiveId)
.collection('settings')
.doc('profile')
.set(data);

loadSettings();

}

async function loadSettings(){

const doc = await db
.collection('archives')
.doc(archiveId)
.collection('settings')
.doc('profile')
.get();

if(!doc.exists) return;

const data = doc.data();

if(data.artistName){
document.getElementById('roomTitle').textContent = data.artistName;
}

if(data.backgroundImage){
document.querySelector('.background').style.backgroundImage = `url('${data.backgroundImage}')`;
}

}

async function addMessage(){

await db
.collection('archives')
.doc(archiveId)
.collection('messages')
.add({
text:document.getElementById('messageText').value,
image:document.getElementById('messageImage').value,
time:document.getElementById('messageTime').value,
createdAt:Date.now(),
favorite:false
});

}

db.collection('archives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messages = snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
}));

renderMessages(messages);

});

function renderMessages(list){

chatWrap.innerHTML = '';

list.forEach(msg=>{

const div = document.createElement('div');

div.className = 'message-row';

const imageHtml = msg.image
? `<img class="message-image" src="${msg.image}">`
: '';

const favorite = msg.favorite ? '⭐' : '☆';

div.innerHTML = `

<div class="profile">
<img src="${document.getElementById('artistPhoto').value || 'https://i.imgur.com/8Km9tLL.jpg'}">
</div>

<div class="message-content">

<div class="artist-line">
<div class="artist-badge">ARTIST</div>
<div class="artist-name">${document.getElementById('artistName').value || 'HAN YUJIN'}</div>
</div>

<div style="position:relative;">

<div class="favorite" onclick="toggleFavorite('${msg.id}',${msg.favorite})">
${favorite}
</div>

${imageHtml}

${msg.text
? `<div class="bubble">${msg.text}</div>`
: ''}

</div>

<div class="time">
${msg.time || ''}
</div>

</div>

`;

chatWrap.appendChild(div);

});

}

async function toggleFavorite(id,current){

await db
.collection('archives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({
favorite:!current
});

}

function openGallery(){

const images = messages
.filter(m=>m.image)
.map(m=>`
<a href="${m.image}" target="_blank">
<img src="${m.image}">
</a>
`).join('');

const win = window.open('','_blank');

win.document.write(`
<style>
body{
margin:0;
padding:20px;
font-family:Pretendard,sans-serif;
background:#f5f5f5;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
img{
width:100%;
border-radius:20px;
}
</style>
<div class="grid">${images}</div>
`);

}

async function runSearch(){

const value =
document.getElementById('searchInput')
.value
.toLowerCase();

const snapshot = await db
.collectionGroup('messages')
.get();

const results = snapshot.docs
.map(doc=>doc.data())
.filter(msg=>(msg.text || '').toLowerCase().includes(value));

const html = results.map(msg=>`
<div style="
padding:12px;
border-radius:14px;
background:#f5f5f5;
margin-bottom:10px;
font-size:14px;
">
${msg.text}
</div>
`).join('');

document.getElementById('searchResults').innerHTML = html;

}

loadSettings();

</script>
</body>
</html>
