<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bubble Archive</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#dcdcdc;
font-family:'Pretendard',sans-serif;
height:100vh;
overflow:hidden;
}

.app{
width:100%;
max-width:720px;
height:100vh;
margin:auto;
position:relative;
background:#dcdcdc;
overflow:hidden;
}

.bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0.18;
z-index:0;
}

.topbar{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:720px;
height:110px;
background:#f7f7f7;
border-bottom-left-radius:24px;
border-bottom-right-radius:24px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
z-index:100;
display:flex;
flex-direction:column;
justify-content:center;
padding-top:8px;
}

.top-row{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.top-title{
font-size:20px;
font-weight:700;
color:#111;
}

.icon-btn{
font-size:28px;
color:#111;
background:none;
border:none;
cursor:pointer;
}

.logo{
margin-top:8px;
text-align:center;
font-size:17px;
font-weight:700;
font-style:italic;
color:#111;
}

.chat-area{
position:absolute;
top:110px;
bottom:90px;
left:0;
right:0;
overflow-y:auto;
padding:20px 14px 60px;
z-index:1;
}

.message{
display:flex;
align-items:flex-start;
gap:10px;
margin-bottom:22px;
}

.profile{
width:52px;
height:52px;
border-radius:50%;
overflow:hidden;
border:2px solid #ff8d52;
flex-shrink:0;
background:#fff;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.message-content{
max-width:78%;
}

.name-row{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

.artist-badge{
background:#ff7f3e;
color:white;
font-size:11px;
font-weight:700;
padding:3px 7px;
border-radius:6px;
line-height:1;
}

.artist-name{
font-size:15px;
font-weight:700;
color:#111;
}

.bubble{
background:#f4f4f4;
border-radius:18px;
padding:14px 16px;
display:inline-block;
font-size:17px;
line-height:1.5;
color:#111;
word-break:break-word;
max-width:100%;
box-shadow:0 2px 6px rgba(0,0,0,0.03);
}

.photo{
margin-top:2px;
border-radius:20px;
overflow:hidden;
background:#eee;
max-width:100%;
}

.photo img{
width:100%;
display:block;
}

.time{
font-size:13px;
color:#9b9b9b;
margin-top:6px;
margin-left:8px;
}

.input-bar{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:720px;
height:90px;
background:#f5f5f5;
display:flex;
align-items:center;
padding:0 16px;
gap:12px;
z-index:100;
}

.fake-input{
flex:1;
height:54px;
border-radius:999px;
background:white;
border:1px solid #ececec;
}

.bottom-icon{
font-size:30px;
color:#666;
}

.admin-btn{
position:fixed;
right:18px;
bottom:110px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#111;
color:white;
font-size:24px;
cursor:pointer;
z-index:200;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:none;
justify-content:center;
align-items:flex-end;
z-index:999;
}

.panel{
width:100%;
max-width:720px;
max-height:92vh;
overflow:auto;
background:white;
border-radius:28px 28px 0 0;
padding:24px 18px 40px;
}

.panel-title{
font-size:25px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
border:none;
outline:none;
background:#f4f4f4;
border-radius:18px;
padding:16px;
font-size:15px;
margin-bottom:14px;
font-family:'Pretendard',sans-serif;
}

textarea.input{
resize:none;
min-height:120px;
}

.submit{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.gallery-btn{
position:fixed;
left:18px;
bottom:110px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:white;
font-size:24px;
cursor:pointer;
z-index:200;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
border-radius:18px;
display:block;
}

@media (max-width:480px){

.topbar{
height:102px;
}

.chat-area{
top:102px;
}

.bubble{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="app">

<div
class="bg"
id="bg"
style="background-image:url('여기에배경이미지링크넣기');"
></div>

<div class="topbar">

<div class="top-row">

<button class="icon-btn">‹</button>

<div
class="top-title"
id="roomTitle"
>
HAN YUJIN
</div>

<div style="display:flex;gap:12px;">
<button class="icon-btn">⌕</button>
<button class="icon-btn">⋮</button>
</div>

</div>

<div class="logo">
bubble 💗 + 1
</div>

</div>

<div
class="chat-area"
id="chatArea"
></div>

<div class="input-bar">

<div class="fake-input"></div>

<div class="bottom-icon">☺</div>

<div class="bottom-icon">✈</div>

</div>

<button
class="gallery-btn"
onclick="openGallery()"
>
🖼
</button>

<button
class="admin-btn"
onclick="openAdmin()"
>
＋
</button>

</div>

<div
class="overlay"
id="overlay"
>

<div class="panel">

<div class="panel-title">
버블 추가
</div>

<input
class="input"
id="artistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="artistPhoto"
placeholder="프로필 사진 링크"
/>

<input
class="input"
id="roomName"
placeholder="상단 방 제목"
/>

<input
class="input"
id="bgInput"
placeholder="배경 이미지 링크"
/>

<textarea
class="input"
id="messageInput"
placeholder="버블 내용"
></textarea>

<input
class="input"
id="photoInput"
placeholder="사진 링크 (없으면 비워둬)"
/>

<input
class="input"
id="timeInput"
placeholder="오후 3:20"
/>

<button
class="submit"
onclick="addBubble()"
>
저장하기
</button>

</div>

</div>

<div
class="overlay"
id="galleryOverlay"
>

<div class="panel">

<div class="panel-title">
셀카 모아보기
</div>

<div
class="gallery"
id="gallery"
></div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDmrRitOd3F2xoZasaWq6mFbAblrKZFzPg",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17",
measurementId: "G-3QK856857H"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

const chatArea =
document.getElementById('chatArea');

const overlay =
document.getElementById('overlay');

const galleryOverlay =
document.getElementById('galleryOverlay');

let bubbles = [];

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){

overlay.style.display = 'none';

}

});

galleryOverlay.addEventListener('click',(e)=>{

if(e.target === galleryOverlay){

galleryOverlay.style.display = 'none';

}

});

function openAdmin(){

overlay.style.display = 'flex';

}

function openGallery(){

galleryOverlay.style.display = 'flex';

renderGallery();

}

db.collection("bubbleArchives")
.doc(archiveId)
.collection("messages")
.orderBy("createdAt","asc")
.onSnapshot(snapshot=>{

bubbles = snapshot.docs.map(doc=>({

id: doc.id,
...doc.data()

}));

renderBubbles();

});

function renderBubbles(){

chatArea.innerHTML = '';

bubbles.forEach(item=>{

if(item.roomName){

document.getElementById('roomTitle').textContent =
item.roomName;

}

if(item.background){

document.getElementById('bg').style.backgroundImage =
`url('${item.background}')`;

}

const message =
document.createElement('div');

message.className = 'message';

message.innerHTML = `

<div class="profile">
<img src="${item.artistPhoto || ''}">
</div>

<div class="message-content">

<div class="name-row">

<div class="artist-badge">
ARTIST
</div>

<div class="artist-name">
${item.artistName || ''}
</div>

</div>

${item.photo
? `
<div class="photo">
<img src="${item.photo}">
</div>
`
: `
<div class="bubble">
${item.message || ''}
</div>
`
}

${item.photo && item.message
? `
<div
class="bubble"
style="margin-top:8px;"
>
${item.message}
</div>
`
: ''}

<div class="time">
${item.time || ''}
</div>

</div>

`;

chatArea.appendChild(message);

});

chatArea.scrollTop =
chatArea.scrollHeight;

}

async function addBubble(){

await db
.collection("bubbleArchives")
.doc(archiveId)
.collection("messages")
.add({

artistName:
document.getElementById('artistName').value,

artistPhoto:
document.getElementById('artistPhoto').value,

roomName:
document.getElementById('roomName').value,

background:
document.getElementById('bgInput').value,

message:
document.getElementById('messageInput').value,

photo:
document.getElementById('photoInput').value,

time:
document.getElementById('timeInput').value,

createdAt:
Date.now()

});

overlay.style.display = 'none';

document
.querySelectorAll('.input')
.forEach(input=>{

input.value = '';

});

}

function renderGallery(){

const gallery =
document.getElementById('gallery');

gallery.innerHTML = '';

bubbles
.filter(item=>item.photo)
.forEach(item=>{

gallery.innerHTML += `

<img src="${item.photo}">

`;

});

}

</script>

</body>
</html>
