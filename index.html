<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bubble Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Pretendard',sans-serif;
background:#dfeef7;
min-height:100vh;
display:flex;
justify-content:center;
padding:0;
overflow-x:hidden;
}

.background{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
z-index:-2;
}

.background::after{
content:'';
position:absolute;
inset:0;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(8px);
}

.phone{

width:100%;
max-width:700px;
min-height:100vh;
background:white;
display:flex;
flex-direction:column;
position:relative;
overflow:hidden;

}

.header{

padding:18px 18px 10px;
background:white;
border-bottom:1px solid #edf2f7;
position:sticky;
top:0;
z-index:100;

}

.topbar{

display:flex;
align-items:center;
justify-content:space-between;

}

.room-center{
flex:1;
text-align:center;
}

.room-title{
font-size:18px;
font-weight:700;
color:#111;
}

.room-status{
margin-top:4px;
font-size:12px;
color:#111;
}

.icon-btn{

width:36px;
height:36px;
border:none;
background:none;
font-size:22px;
cursor:pointer;
color:#111;

}

.messages{

padding:24px 14px 180px;
display:flex;
flex-direction:column;
gap:18px;
min-height:150vh;

}

.message-row{

display:flex;
align-items:flex-end;
gap:8px;

}

.artist-row{
justify-content:flex-start;
}

.me-row{
justify-content:flex-end;
}

.profile{

width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
border:1px solid #e5e7eb;
background:#f3f4f6;

}

.profile img{

width:100%;
height:100%;
object-fit:cover;
display:block;

}

.bubble-area{
max-width:72%;
display:flex;
flex-direction:column;
gap:5px;
}

.artist-label{
font-size:11px;
font-weight:700;
color:#9ca3af;
margin-left:6px;
letter-spacing:0.04em;
}

.artist-name{
font-size:14px;
font-weight:700;
color:#111;
margin-left:6px;
margin-top:2px;
}

.bubble-wrap{
display:flex;
align-items:flex-end;
gap:6px;
}

.bubble{

padding:12px 14px;
border-radius:18px;
font-size:15px;
line-height:1.5;
word-break:break-word;
position:relative;

}

.artist-bubble{
background:#f5f7fa;
color:#111;
border-top-left-radius:6px;
}

.me-bubble{
background:#9ec4e8;
color:white;
border-top-right-radius:6px;
}

.message-time{
font-size:11px;
color:#6b7280;
margin-bottom:3px;
white-space:nowrap;
}

.bubble-image{

width:100%;
border-radius:16px;
display:block;
margin-top:2px;

}

.favorite-btn{

border:none;
background:none;
font-size:18px;
cursor:pointer;
padding:2px;
color:#b6d2ea;
flex-shrink:0;

}

.favorite-btn.active{
color:#9ec4e8;
}

.bottom-bar{

position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:700px;
padding:14px;
background:white;
border-top:1px solid #edf2f7;
display:flex;
gap:10px;
z-index:200;

}

.fake-input{

flex:1;
height:52px;
border-radius:999px;
background:#f3f4f6;
display:flex;
align-items:center;
padding:0 18px;
font-size:14px;
color:#9ca3af;
cursor:pointer;

}

.send-btn{

width:52px;
height:52px;
border:none;
border-radius:50%;
background:#9ec4e8;
color:white;
font-size:20px;
cursor:pointer;

}

.modal{

position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:flex-end;
z-index:999;

}

.modal-content{

width:100%;
max-width:700px;
background:white;
border-radius:28px 28px 0 0;
padding:24px 18px 40px;
max-height:88vh;
overflow:auto;

}

.modal-title{

font-size:22px;
font-weight:700;
margin-bottom:18px;

}

.input{

width:100%;
height:52px;
border:none;
background:#f3f4f6;
border-radius:16px;
padding:0 16px;
margin-bottom:12px;
font-size:14px;
font-family:'Pretendard',sans-serif;
outline:none;

}

.textarea{

width:100%;
height:120px;
border:none;
background:#f3f4f6;
border-radius:16px;
padding:16px;
margin-bottom:12px;
font-size:14px;
font-family:'Pretendard',sans-serif;
outline:none;
resize:none;

}

.submit{

width:100%;
height:54px;
border:none;
border-radius:18px;
background:#9ec4e8;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;

}

.menu{

position:absolute;
top:62px;
right:18px;
background:white;
border-radius:18px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
display:none;
flex-direction:column;
gap:8px;
z-index:999;

}

.menu button{

border:none;
background:#f3f4f6;
height:42px;
padding:0 16px;
border-radius:12px;
font-size:14px;
font-weight:600;
cursor:pointer;

}

.gallery{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;

}

.gallery img{

width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:16px;

}

.search-box{
display:none;
margin-top:12px;
}

.search-input{

width:100%;
height:44px;
border:none;
background:#f3f4f6;
border-radius:14px;
padding:0 14px;
font-size:14px;
outline:none;

}

@media (max-width:768px){

.messages{
min-height:180vh;
padding-bottom:220px;
}

.bubble-area{
max-width:80%;
}

}

</style>

</head>

<body>

<div class="background" id="background"></div>

<div class="phone">

<div class="header">

<div class="topbar">

<button class="icon-btn" onclick="toggleSearch()">⌕</button>

<div class="room-center">

<div class="room-title" id="roomTitle">
Bubble
</div>

<div class="room-status">
D-<span id="dday">0</span>
</div>

</div>

<button class="icon-btn" onclick="toggleMenu()">⋮</button>

</div>

<div class="search-box" id="searchBox">

<input
class="search-input"
id="searchInput"
placeholder="메시지 검색"
oninput="runSearch()"
>

</div>

<div class="menu" id="menu">

<button onclick="openProfileModal()">
프로필 설정
</button>

<button onclick="openGallery()">
사진 모아보기
</button>

<button onclick="openFavorites()">
즐겨찾기
</button>

</div>

</div>

<div class="messages" id="messages"></div>

<div class="bottom-bar">

<div class="fake-input" onclick="openMessageModal()">
메시지 추가하기
</div>

<button class="send-btn" onclick="openMessageModal()">
+
</button>

</div>

</div>

<div class="modal" id="profileModal">

<div class="modal-content">

<div class="modal-title">
프로필 설정
</div>

<input class="input" id="roomTitleInput" placeholder="채팅방 이름">

<input class="input" id="artistNameInput" placeholder="아티스트 이름">

<input class="input" id="ddayInput" placeholder="디데이 숫자">

<input class="input" id="profileImageInput" placeholder="프로필 사진 링크">

<input class="input" id="backgroundInput" placeholder="배경 이미지 링크">

<button class="submit" onclick="saveProfile()">
저장하기
</button>

</div>

</div>

<div class="modal" id="messageModal">

<div class="modal-content">

<div class="modal-title">
메시지 추가
</div>

<textarea
class="textarea"
id="messageInput"
placeholder="버블 메시지"
></textarea>

<input
class="input"
id="messageImageInput"
placeholder="이미지 링크"
>

<input
class="input"
id="messageTimeInput"
placeholder="시간 예시 22:14"
>

<label style="font-size:14px;display:flex;gap:8px;margin-bottom:16px;">
<input type="checkbox" id="artistCheck" checked>
아티스트 메시지
</label>

<button class="submit" onclick="addMessage()">
추가하기
</button>

</div>

</div>

<div class="modal" id="galleryModal">

<div class="modal-content">

<div class="modal-title">
사진 모아보기
</div>

<div class="gallery" id="gallery"></div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDmrRitOd3F2xoZasaWq6mFbAblrKZFzPg",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

let profileData = {};
let messagesData = [];

const messages =
document.getElementById('messages');

db.collection('bubbleProfiles')
.doc(archiveId)
.onSnapshot(doc=>{

profileData = doc.data() || {};

applyProfile();

});

db.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messagesData =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderMessages(messagesData);

});

function applyProfile(){

document.getElementById('roomTitle').innerText =
profileData.roomTitle || 'Bubble';

document.getElementById('dday').innerText =
profileData.dday || '0';

document.getElementById('background').style.backgroundImage =
`url('${profileData.background || ''}')`;

}

function renderMessages(list){

messages.innerHTML='';

list.forEach(msg=>{

const row =
document.createElement('div');

row.className =
`message-row ${msg.artist ? 'artist-row' : 'me-row'}`;

row.innerHTML = `

${msg.artist ? `

<div class="profile">

<img
src="${(profileData.profileImage || '').trim() || 'https://i.imgur.com/8Km9tLL.jpg'}"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='https://i.imgur.com/8Km9tLL.jpg'"
>

</div>

` : ''}

<div class="bubble-area">

${msg.artist ? `

<div class="artist-label">
ARTIST
</div>

<div class="artist-name">
${profileData.artistName || 'ARTIST'}
</div>

` : ''}

<div class="bubble-wrap">

<div class="bubble ${msg.artist ? 'artist-bubble' : 'me-bubble'}">

${msg.text ? `
<div>${msg.text}</div>
` : ''}

${msg.image ? `

<img
class="bubble-image"
src="${(msg.image || '').trim()}"
referrerpolicy="no-referrer"
crossorigin="anonymous"
loading="lazy"
onerror="this.style.display='none'"
>

` : ''}

</div>

<div class="message-time">
${msg.time || ''}
</div>

<button
class="favorite-btn ${msg.favorite ? 'active' : ''}"
onclick="toggleFavorite('${msg.id}',${msg.favorite})"
>
★
</button>

</div>

</div>

`;

messages.appendChild(row);

});

}

async function saveProfile(){

const newData = {

roomTitle:
document.getElementById('roomTitleInput').value.trim(),

artistName:
document.getElementById('artistNameInput').value.trim(),

dday:
document.getElementById('ddayInput').value.trim(),

profileImage:
document.getElementById('profileImageInput').value.trim(),

background:
document.getElementById('backgroundInput').value.trim()

};

await db
.collection('bubbleProfiles')
.doc(archiveId)
.set(newData);

closeModal('profileModal');

}

async function addMessage(){

const text =
document.getElementById('messageInput').value.trim();

const image =
document.getElementById('messageImageInput').value.trim();

const time =
document.getElementById('messageTimeInput').value.trim();

const artist =
document.getElementById('artistCheck').checked;

if(!text && !image){

alert('메시지나 이미지를 입력해줘!');
return;

}

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.add({

text,
image,
time,
artist,
favorite:false,
createdAt:Date.now()

});

document.getElementById('messageInput').value='';
document.getElementById('messageImageInput').value='';
document.getElementById('messageTimeInput').value='';

closeModal('messageModal');

}

async function toggleFavorite(id,current){

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({

favorite:!current

});

}

function openProfileModal(){

document.getElementById('profileModal').style.display='flex';

toggleMenu();

}

function openMessageModal(){

document.getElementById('messageModal').style.display='flex';

}

function openGallery(){

document.getElementById('galleryModal').style.display='flex';

const gallery =
document.getElementById('gallery');

gallery.innerHTML='';

messagesData
.filter(msg=>msg.image)
.forEach(msg=>{

gallery.innerHTML += `

<a
href="${msg.image}"
download
target="_blank"
>

<img src="${msg.image}">

</a>

`;

});

toggleMenu();

}

function openFavorites(){

const favorites =
messagesData.filter(msg=>msg.favorite);

renderMessages(favorites);

toggleMenu();

}

function toggleMenu(){

const menu =
document.getElementById('menu');

menu.style.display =
menu.style.display === 'flex'
? 'none'
: 'flex';

}

function toggleSearch(){

const box =
document.getElementById('searchBox');

box.style.display =
box.style.display === 'block'
? 'none'
: 'block';

}

function runSearch(){

const value =
document
.getElementById('searchInput')
.value
.toLowerCase()
.trim();

const filtered =
messagesData.filter(msg=>{

return `
${msg.text}
${msg.time}
`
.toLowerCase()
.includes(value);

});

renderMessages(filtered);

}

function closeModal(id){

document.getElementById(id).style.display='none';

}

document.querySelectorAll('.modal').forEach(modal=>{

modal.addEventListener('click',e=>{

if(e.target === modal){

modal.style.display='none';

}

});

});

</script>

</body>
</html>
