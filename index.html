 <!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bubble Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Pretendard',sans-serif;
background:#dbeaf4;
display:flex;
justify-content:center;
overflow-x:hidden;
min-height:100vh;
}

.background{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
z-index:-2;
}

.background::after{
content:'';
position:absolute;
inset:0;
background:rgba(255,255,255,0.42);
backdrop-filter:blur(10px);
}

.app{
width:100%;
max-width:760px;
background:white;
min-height:420vh;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
position:sticky;
top:0;
z-index:100;
background:white;
padding:12px 18px 10px;
border-bottom:1px solid #eef2f6;
}

.header-top{
display:flex;
align-items:center;
justify-content:space-between;
}

.icon-btn{
width:34px;
height:34px;
border:none;
background:none;
font-size:21px;
cursor:pointer;
color:#111;
}

.header-center{
flex:1;
text-align:center;
}

.room-title{
font-size:17px;
font-weight:700;
color:#111;
line-height:1.2;
}

.room-status{
margin-top:4px;
font-size:11px;
color:#111;
}

.search-wrap{
display:none;
margin-top:12px;
}

.search-input{
width:100%;
height:44px;
border:none;
background:#f4f6f8;
border-radius:14px;
padding:0 14px;
font-size:14px;
outline:none;
}

.menu{
position:absolute;
top:58px;
right:16px;
background:white;
border-radius:18px;
padding:10px;
display:none;
flex-direction:column;
gap:8px;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
z-index:999;
}

.menu button{
height:42px;
border:none;
background:#f4f6f8;
border-radius:12px;
padding:0 16px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.chat{
padding:22px 14px 240px;
display:flex;
flex-direction:column;
gap:18px;
min-height:400vh;
}

.message-row{
display:flex;
align-items:flex-end;
gap:8px;
}

.artist-row{
justify-content:flex-start;
}

.me-row{
justify-content:flex-end;
}

.profile{
width:38px;
height:38px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
background:#eee;
margin-bottom:2px;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.bubble-area{
max-width:78%;
display:flex;
flex-direction:column;
}

.artist-small{
font-size:10px;
font-weight:700;
letter-spacing:0.05em;
color:#a3a8af;
margin-left:6px;
}

.artist-name{
font-size:14px;
font-weight:700;
color:#111;
margin-left:6px;
margin-top:2px;
margin-bottom:6px;
}

.bubble-line{
display:flex;
align-items:flex-end;
gap:5px;
}

.bubble{
padding:12px 14px;
font-size:15px;
line-height:1.55;
word-break:break-word;
position:relative;
}

.artist-bubble{
background:#f3f5f7;
color:#111;
border-radius:8px 20px 20px 20px;
}

.me-bubble{
background:#9ec4e8;
color:white;
border-radius:20px 8px 20px 20px;
}

.time{
font-size:10px;
color:#8d949d;
margin-bottom:4px;
white-space:nowrap;
}

.favorite{
border:none;
background:none;
font-size:17px;
cursor:pointer;
color:#d8e7f3;
padding-bottom:1px;
flex-shrink:0;
}

.favorite.active{
color:#9ec4e8;
}

.bubble-image{
width:100%;
display:block;
border-radius:14px;
margin-top:4px;
}

.bottom{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:760px;
background:white;
border-top:1px solid #eef2f6;
padding:14px;
display:flex;
gap:10px;
z-index:120;
}

.fake-input{
flex:1;
height:52px;
border-radius:999px;
background:#f4f6f8;
display:flex;
align-items:center;
padding:0 18px;
font-size:14px;
color:#a0a6ae;
cursor:pointer;
}

.plus{
width:52px;
height:52px;
border:none;
border-radius:50%;
background:#9ec4e8;
color:white;
font-size:22px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.36);
display:none;
justify-content:center;
align-items:flex-end;
z-index:9999;
}

.modal-content{
width:100%;
max-width:760px;
background:white;
border-radius:28px 28px 0 0;
padding:24px 18px 40px;
max-height:88vh;
overflow:auto;
}

.modal-title{
font-size:22px;
font-weight:700;
margin-bottom:18px;
}

.input{
width:100%;
height:52px;
border:none;
background:#f4f6f8;
border-radius:16px;
padding:0 16px;
margin-bottom:12px;
font-size:14px;
outline:none;
font-family:'Pretendard',sans-serif;
}

.textarea{
width:100%;
height:130px;
border:none;
background:#f4f6f8;
border-radius:16px;
padding:16px;
margin-bottom:12px;
font-size:14px;
outline:none;
resize:none;
font-family:'Pretendard',sans-serif;
}

.submit{
width:100%;
height:54px;
border:none;
border-radius:18px;
background:#9ec4e8;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:16px;
display:block;
}

.favorite-card{
background:#f4f6f8;
padding:14px;
border-radius:18px;
margin-bottom:10px;
font-size:14px;
line-height:1.55;
}

.favorite-card img{
width:100%;
border-radius:14px;
margin-top:8px;
display:block;
}

@media (max-width:768px){

.chat{
min-height:440vh;
padding-bottom:250px;
}

.bubble-area{
max-width:84%;
}

.room-title{
font-size:16px;
}

.bubble{
font-size:14px;
}

}

</style>

</head>

<body>

<div class="background" id="background"></div>

<div class="app">

<div class="header">

<div class="header-top">

<button class="icon-btn" onclick="toggleSearch()">⌕</button>

<div class="header-center">

<div class="room-title" id="roomTitle">
Bubble
</div>

<div class="room-status">
D-<span id="dday">0</span>
</div>

</div>

<button class="icon-btn" onclick="toggleMenu()">⋮</button>

</div>

<div class="search-wrap" id="searchWrap">

<input
class="search-input"
id="searchInput"
placeholder="메시지 검색"
oninput="runSearch()"
>

</div>

<div class="menu" id="menu">

<button onclick="openProfileModal()">
프로필 설정
</button>

<button onclick="openGallery()">
사진 모아보기
</button>

<button onclick="openFavorites()">
즐겨찾기
</button>

</div>

</div>

<div class="chat" id="chat"></div>

<div class="bottom">

<div class="fake-input" onclick="openMessageModal()">
메시지 추가하기
</div>

<button class="plus" onclick="openMessageModal()">
+
</button>

</div>

</div>

<!-- 프로필 -->

<div class="modal" id="profileModal">

<div class="modal-content">

<div class="modal-title">
프로필 설정
</div>

<input class="input" id="roomTitleInput" placeholder="채팅방 이름">

<input class="input" id="artistNameInput" placeholder="아티스트 이름">

<input class="input" id="ddayInput" placeholder="디데이 숫자">

<input class="input" id="profileImageInput" placeholder="프로필 사진 링크">

<input class="input" id="backgroundInput" placeholder="배경 이미지 링크">

<button class="submit" onclick="saveProfile()">
저장하기
</button>

</div>

</div>

<!-- 메시지 -->

<div class="modal" id="messageModal">

<div class="modal-content">

<div class="modal-title">
메시지 추가
</div>

<textarea
class="textarea"
id="messageInput"
placeholder="버블 메시지"
></textarea>

<input
class="input"
id="messageImageInput"
placeholder="이미지 링크"
>

<input
class="input"
id="messageTimeInput"
placeholder="시간 예시 22:14"
>

<label style="display:flex;gap:8px;font-size:14px;margin-bottom:16px;">

<input type="checkbox" id="artistCheck" checked>

아티스트 메시지

</label>

<button class="submit" onclick="addMessage()">
추가하기
</button>

</div>

</div>

<!-- 갤러리 -->

<div class="modal" id="galleryModal">

<div class="modal-content">

<div class="modal-title">
사진 모아보기
</div>

<div class="gallery" id="gallery"></div>

</div>

</div>

<!-- 즐겨찾기 -->

<div class="modal" id="favoriteModal">

<div class="modal-content">

<div class="modal-title">
즐겨찾기
</div>

<div id="favoriteList"></div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "bubble-archive.firebaseapp.com",
projectId: "bubble-archive",
storageBucket: "bubble-archive.firebasestorage.app",
messagingSenderId: "527543418806",
appId: "1:527543418806:web:125dd660b438c7d3224b17"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

let profileData = {};
let messagesData = [];

const chat =
document.getElementById('chat');

db.collection('bubbleProfiles')
.doc(archiveId)
.onSnapshot(doc=>{

profileData = doc.data() || {};

applyProfile();

});

db.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.orderBy('createdAt','asc')
.onSnapshot(snapshot=>{

messagesData =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderMessages(messagesData);

});

function applyProfile(){

document.getElementById('roomTitle').innerText =
profileData.roomTitle || 'Bubble';

document.getElementById('dday').innerText =
profileData.dday || '0';

document.getElementById('background').style.backgroundImage =
`url('${profileData.background || ''}')`;

}

function renderMessages(list){

chat.innerHTML='';

list.forEach(msg=>{

const row =
document.createElement('div');

row.className =
`message-row ${msg.artist ? 'artist-row' : 'me-row'}`;

row.innerHTML = `

${msg.artist ? `

<div class="profile">

<img
src="${(profileData.profileImage || '').trim() || 'https://i.imgur.com/8Km9tLL.jpg'}"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='https://i.imgur.com/8Km9tLL.jpg'"
>

</div>

` : ''}

<div class="bubble-area">

${msg.artist ? `

<div class="artist-small">
ARTIST
</div>

<div class="artist-name">
${profileData.artistName || 'ARTIST'}
</div>

` : ''}

<div class="bubble-line">

<div class="bubble ${msg.artist ? 'artist-bubble' : 'me-bubble'}">

${msg.text ? `
<div>${msg.text}</div>
` : ''}

${msg.image ? `

<img
class="bubble-image"
src="${msg.image}"
loading="lazy"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.style.display='none'"
>

` : ''}

</div>

<div class="time">
${msg.time || ''}
</div>

<button
class="favorite ${msg.favorite ? 'active' : ''}"
onclick="toggleFavorite('${msg.id}',${msg.favorite})"
>
★
</button>

</div>

</div>

`;

chat.appendChild(row);

});

}

async function saveProfile(){

await db
.collection('bubbleProfiles')
.doc(archiveId)
.set({

roomTitle:
document.getElementById('roomTitleInput').value.trim(),

artistName:
document.getElementById('artistNameInput').value.trim(),

dday:
document.getElementById('ddayInput').value.trim(),

profileImage:
document.getElementById('profileImageInput').value.trim(),

background:
document.getElementById('backgroundInput').value.trim()

});

closeModal('profileModal');

}

async function addMessage(){

const text =
document.getElementById('messageInput').value.trim();

const image =
document.getElementById('messageImageInput').value.trim();

const time =
document.getElementById('messageTimeInput').value.trim();

const artist =
document.getElementById('artistCheck').checked;

if(!text && !image){

alert('메시지나 이미지를 입력해줘!');
return;

}

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.add({

text,
image,
time,
artist,
favorite:false,
createdAt:Date.now()

});

document.getElementById('messageInput').value='';
document.getElementById('messageImageInput').value='';
document.getElementById('messageTimeInput').value='';

closeModal('messageModal');

}

async function toggleFavorite(id,current){

await db
.collection('bubbleArchives')
.doc(archiveId)
.collection('messages')
.doc(id)
.update({

favorite:!current

});

}

function openGallery(){

document.getElementById('galleryModal').style.display='flex';

const gallery =
document.getElementById('gallery');

gallery.innerHTML='';

messagesData
.filter(msg=>msg.image)
.forEach(msg=>{

gallery.innerHTML += `

<a href="${msg.image}" target="_blank">

<img src="${msg.image}">

</a>

`;

});

toggleMenu();

}

function openFavorites(){

document.getElementById('favoriteModal').style.display='flex';

const list =
document.getElementById('favoriteList');

list.innerHTML='';

const favorites =
messagesData.filter(msg=>msg.favorite);

if(favorites.length === 0){

list.innerHTML = `
<div style="color:#9ca3af;font-size:14px;">
즐겨찾기한 메시지가 없어!
</div>
`;

return;

}

favorites.forEach(msg=>{

list.innerHTML += `

<div class="favorite-card">

${msg.text || ''}

${msg.image ? `

<img src="${msg.image}">

` : ''}

</div>

`;

});

toggleMenu();

}

function toggleSearch(){

const wrap =
document.getElementById('searchWrap');

wrap.style.display =
wrap.style.display === 'block'
? 'none'
: 'block';

}

function runSearch(){

const value =
document
.getElementById('searchInput')
.value
.toLowerCase()
.trim();

if(value === ''){

renderMessages(messagesData);
return;

}

const filtered =
messagesData.filter(msg=>{

return `
${msg.text}
${msg.time}
`
.toLowerCase()
.includes(value);

});

renderMessages(filtered);

}

function toggleMenu(){

const menu =
document.getElementById('menu');

menu.style.display =
menu.style.display === 'flex'
? 'none'
: 'flex';

}

function openProfileModal(){

document.getElementById('profileModal').style.display='flex';

toggleMenu();

}

function openMessageModal(){

document.getElementById('messageModal').style.display='flex';

}

function closeModal(id){

document.getElementById(id).style.display='none';

}

document.querySelectorAll('.modal').forEach(modal=>{

modal.addEventListener('click',e=>{

if(e.target === modal){

modal.style.display='none';

}

});

});

</script>

</body>
</html>
